<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Extraction & QA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 12px; }
    #img-preview { max-height: 480px; object-fit: contain; width: 100%; }
    #extracted-text { height: 340px; font-size: 0.85rem; resize: none; }
    #answer-box { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1rem; min-height: 80px; white-space: pre-wrap; }
    .spinner-border { width: 1.2rem; height: 1.2rem; }
  </style>
</head>
<body>
<div class="container py-4">

  <h3 class="mb-4 fw-bold">Invoice Extraction &amp; QA</h3>

  <!-- Upload -->
  <div class="card shadow-sm mb-4 p-4">
    <label class="form-label fw-semibold">Upload Invoice (PDF / Image)</label>
    <input type="file" id="file-input" class="form-control" accept=".pdf,.png,.jpg,.jpeg"/>
    <div id="upload-status" class="mt-2 text-muted small"></div>
  </div>

  <!-- Two-column: image + extracted text -->
  <div class="row g-4 mb-4" id="result-row" style="display:none!important">
    <div class="col-md-6">
      <div class="card shadow-sm p-3 h-100">
        <h6 class="fw-semibold mb-3">Uploaded Invoice</h6>
        <img id="img-preview" src="" alt="Invoice preview"/>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm p-3 h-100">
        <h6 class="fw-semibold mb-3">Extracted Text</h6>
        <textarea id="extracted-text" class="form-control"></textarea>
      </div>
    </div>
  </div>

  <hr/>

  <!-- Q&A -->
  <div id="qa-section" style="display:none">
    <h5 class="fw-semibold mb-3">Ask Questions from Invoice</h5>
    <div class="input-group mb-3">
      <input type="text" id="query-input" class="form-control" placeholder="Enter your question…"/>
      <button class="btn btn-primary" id="ask-btn">
        <span id="ask-spinner" class="spinner-border d-none" role="status"></span>
        Ask
      </button>
    </div>
    <div id="answer-section" style="display:none">
      <h6 class="fw-semibold">Answer</h6>
      <div id="answer-box"></div>
    </div>
  </div>

</div>

<script>
  const fileInput    = document.getElementById('file-input');
  const uploadStatus = document.getElementById('upload-status');
  const resultRow    = document.getElementById('result-row');
  const imgPreview   = document.getElementById('img-preview');
  const extractedTA  = document.getElementById('extracted-text');
  const qaSection    = document.getElementById('qa-section');
  const queryInput   = document.getElementById('query-input');
  const askBtn       = document.getElementById('ask-btn');
  const askSpinner   = document.getElementById('ask-spinner');
  const answerSection = document.getElementById('answer-section');
  const answerBox    = document.getElementById('answer-box');

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    uploadStatus.textContent = 'Extracting… please wait';
    uploadStatus.className = 'mt-2 text-muted small';
    resultRow.style.display = 'none';
    qaSection.style.display = 'none';
    answerSection.style.display = 'none';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (!data.success) {
        uploadStatus.textContent = 'Error: ' + data.error;
        uploadStatus.className = 'mt-2 text-danger small';
        return;
      }

      if (data.image_b64) {
        imgPreview.src = 'data:image/png;base64,' + data.image_b64;
      }
      extractedTA.value = data.extracted_text;
      resultRow.style.removeProperty('display');
      qaSection.style.display = 'block';
      uploadStatus.textContent = 'Extraction complete.';
      uploadStatus.className = 'mt-2 text-success small';

    } catch (err) {
      uploadStatus.textContent = 'Request failed: ' + err.message;
      uploadStatus.className = 'mt-2 text-danger small';
    }
  });

  askBtn.addEventListener('click', async () => {
    const query = queryInput.value.trim();
    if (!query) return;

    askBtn.disabled = true;
    askSpinner.classList.remove('d-none');
    answerSection.style.display = 'none';

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await res.json();

      answerBox.textContent = data.success ? data.answer : 'Error: ' + data.error;
      answerSection.style.display = 'block';

    } catch (err) {
      answerBox.textContent = 'Request failed: ' + err.message;
      answerSection.style.display = 'block';
    } finally {
      askBtn.disabled = false;
      askSpinner.classList.add('d-none');
    }
  });

  queryInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') askBtn.click();
  });
</script>
</body>
</html>
